services:
  - type: web
    name: alpha-signal
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install gunicorn resend
    startCommand: gunicorn web_app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_RECEIVER
        sync: false
      - key: PYTHONIOENCODING
        value: utf-8
