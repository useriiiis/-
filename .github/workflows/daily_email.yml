name: Daily Alpha Signal Email

on:
  schedule:
    # 8:00 AM Beijing/Macau Time (UTC+8) = 00:00 UTC
    - cron: '0 0 * * *'
    # 9:00 PM Beijing/Macau Time (UTC+8) = 13:00 UTC
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONIOENCODING: utf-8
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      SMTP_SERVER: smtp.gmail.com
      SMTP_PORT: "587"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install resend

      - name: Create .env
        run: |
          echo "DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY" > .env
          echo "DEEPSEEK_BASE_URL=https://api.deepseek.com" >> .env
          echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env
          echo "EMAIL_RECEIVER=$EMAIL_RECEIVER" >> .env
          echo "EMAIL_SENDER=$EMAIL_SENDER" >> .env
          echo "EMAIL_PASSWORD=$EMAIL_PASSWORD" >> .env
          echo "SMTP_SERVER=smtp.gmail.com" >> .env
          echo "SMTP_PORT=587" >> .env

      - name: Run daily pipeline and send email
        run: python run_daily.py

      - name: Run 5-dimension stock analysis
        run: python full_analysis.py || true

      - name: Update GitHub Pages data
        run: |
          cp latest_data.json docs/data/latest.json 2>/dev/null || true
          # Copy the latest analysis file
          ls -t full_analysis_*.json 2>/dev/null | head -1 | xargs -I{} cp {} docs/data/analysis.json 2>/dev/null || true

      - name: Commit and push data to GitHub Pages
        run: |
          git config user.name "Alpha Signal Bot"
          git config user.email "bot@alphasignal.dev"
          git add docs/data/
          git diff --staged --quiet || git commit -m "Update data $(date -u +%Y-%m-%dT%H:%M)"
          git push || true
